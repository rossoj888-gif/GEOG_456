<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAB Spread Model</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

   
    <script src="./data/manifest.js"></script>
    <script src="./data/suitability.js"></script>
    <script src="./data/detections.js"></script>
    <script src="./data/isolines.js"></script>

    <script src="./data/spread_2003.js"></script>
    <script src="./data/spread_2004.js"></script>
    <script src="./data/spread_2005.js"></script>
    <script src="./data/spread_2006.js"></script>
    <script src="./data/spread_2007.js"></script>
    <script src="./data/spread_2008.js"></script>
    <script src="./data/spread_2009.js"></script>
    <script src="./data/spread_2010.js"></script>
    <script src="./data/spread_2011.js"></script>
    <script src="./data/spread_2012.js"></script>
    <script src="./data/spread_2013.js"></script>
    <script src="./data/spread_2014.js"></script>
    <script src="./data/spread_2015.js"></script>
    <script src="./data/spread_2016.js"></script>
    <script src="./data/spread_2017.js"></script>
    <script src="./data/spread_2018.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg:      #0a0f0a;
            --surface: #111a11;
            --border:  #1f3a1f;
            --muted:   #3a5c3a;
            --subtle:  #6a9e6a;
            --text:    #d4ead4;
            --accent:  #4caf50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /*  Header  */
        #header {
            padding: 14px 28px 12px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            gap: 16px;
        }
        #header h1 { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: 0.01em; }
        #header p  { font-size: 12px; color: var(--subtle); font-weight: 400; }

        #status-badge {
            margin-left: auto; font-size: 11px; font-weight: 500;
            padding: 3px 9px; border-radius: 12px; border: 1px solid; white-space: nowrap;
        }
        .badge-observed  { color: #f4a261; border-color: #f4a261; background: rgba(244,162,97,0.12); }
        .badge-projected { color: #e63946; border-color: #e63946; background: rgba(230,57,70,0.12); }

        /*  Map */
        #map { width: 100%; height: calc(100vh - 118px); background: var(--bg); }

        /*  Footer */
        #footer {
            height: 58px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex; align-items: center; gap: 20px; padding: 0 28px;
        }

        #year-display { font-size: 13px; font-weight: 600; color: var(--accent); min-width: 36px; }

        #year-slider {
            flex: 1; max-width: 320px; -webkit-appearance: none;
            height: 3px; border-radius: 2px; background: var(--border); outline: none; cursor: pointer;
        }
        #year-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
            background: #4caf50; cursor: pointer;
            border: 2px solid var(--bg); box-shadow: 0 0 6px #4caf50;
        }
        #year-slider.projected::-webkit-slider-thumb {
            background: #e63946; box-shadow: 0 0 6px #e63946;
        }
        #year-slider::-moz-range-thumb {
            width: 14px; height: 14px; border-radius: 50%;
            background: #4caf50; cursor: pointer; border: 2px solid var(--bg);
        }

        .divider { width: 1px; height: 20px; background: var(--border); }

        #play-btn {
            background: none; border: 1px solid var(--border); border-radius: 6px;
            color: var(--text); font-size: 12px; font-weight: 500; font-family: inherit;
            padding: 5px 14px; cursor: pointer; transition: background 0.15s; white-space: nowrap;
            flex-shrink: 0;
        }
        #play-btn:hover { background: var(--border); }

        /*Toggles */
        .toggle-group { display: flex; gap: 14px; }
        .tog {
            display: flex; align-items: center; gap: 6px;
            font-size: 12px; color: var(--subtle); cursor: pointer; user-select: none;
        }
        .tog input[type=checkbox] {
            -webkit-appearance: none; width: 14px; height: 14px;
            border: 1.5px solid var(--border); border-radius: 3px;
            background: var(--bg); cursor: pointer; position: relative;
        }
        .tog input[type=checkbox]:checked { background: var(--accent); border-color: var(--accent); }
        .tog input[type=checkbox]:checked::after {
            content: ''; position: absolute; left: 2px; top: -1px;
            width: 5px; height: 9px; border: 2px solid var(--bg);
            border-top: none; border-left: none; transform: rotate(45deg);
        }

        /* Stats */
        .stat-group { margin-left: auto; display: flex; gap: 20px; }
        .stat { font-size: 11px; color: var(--subtle); text-align: right; }
        .stat span { display: block; font-size: 13px; font-weight: 600; color: var(--accent); }

        /*  Legend */
        .map-legend {
            background: rgba(10,18,10,0.95);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 15px;
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 11px;
            min-width: 148px;
            backdrop-filter: blur(4px);
            line-height: 1.4;
        }
        .map-legend h4 {
            font-size: 10px; font-weight: 600;
            letter-spacing: 0.09em; text-transform: uppercase;
            color: var(--subtle); margin-bottom: 9px;
        }
        .legend-grad-wrap { display: flex; gap: 8px; align-items: stretch; margin-bottom: 10px; }
        .legend-gradient {
            width: 13px; border-radius: 3px; flex-shrink: 0;
            background: linear-gradient(to top,
                #440154  0%,
                #3b528b 25%,
                #21918c 50%,
                #5ec962 75%,
                #fde725 100%);
        }
        .legend-labels {
            display: flex; flex-direction: column;
            justify-content: space-between;
            color: var(--subtle); font-size: 10px;
        }
        .legend-sep { border-top: 1px solid var(--border); margin: 8px 0; }
        .legend-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
        .legend-row:last-child { margin-bottom: 0; }
        .legend-swatch {
            width: 13px; height: 13px; border-radius: 2px; flex-shrink: 0;
        }
        .legend-dot {
            width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
            margin: 0 1.5px;
        }

        /* Leaflet UI  */
        .leaflet-control-layers {
            border: 1px solid var(--border) !important; border-radius: 8px !important;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
            background: var(--surface) !important;
            font-family: 'Inter', system-ui, sans-serif !important;
            font-size: 12px !important; color: var(--text) !important;
        }
        .leaflet-control-layers label { color: var(--text) !important; }
        .leaflet-control-layers-separator { border-top-color: var(--border) !important; }
        .leaflet-popup-content-wrapper {
            border-radius: 8px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.5) !important;
            font-family: 'Inter', system-ui, sans-serif !important;
            font-size: 12px !important; color: var(--text) !important;
            background: var(--surface) !important;
            border: 1px solid var(--border) !important;
        }
        .leaflet-popup-tip { background: var(--surface) !important; }
        .leaflet-bar a {
            background: var(--surface) !important; color: var(--text) !important;
            border-bottom: 1px solid var(--border) !important;
        }
        .leaflet-bar a:hover { background: var(--border) !important; }
        .leaflet-bar {
            border: 1px solid var(--border) !important; border-radius: 8px !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4) !important; overflow: hidden;
        }
        .leaflet-control-attribution {
            background: rgba(13,17,23,0.75) !important;
            color: var(--muted) !important; font-size: 9px !important;
        }
        .leaflet-control-attribution a { color: var(--subtle) !important; }
    </style>
</head>
<body>

<div id="header">
    <h1>Emerald Ash Borer - Projected Spread</h1>
    <p>MaxEnt SDM - BIO6, BIO4, BIO12 - ash-weighted background</p>
    <span id="status-badge" class="badge-observed">Observed</span>
</div>

<div id="map"></div>

<div id="footer">
    <span id="year-display">—</span>
    <input type="range" id="year-slider" min="0" max="1" step="1" value="0"
        oninput="moveSlider(this.value)">
    <button id="play-btn" onclick="togglePlay()">&#9654; Play</button>

    <div class="divider"></div>

    <div class="toggle-group">
        <label class="tog">
            <input type="checkbox" id="tog-suit" checked onchange="toggleSuit()"> Suitability
        </label>
        <label class="tog">
            <input type="checkbox" id="tog-spread" checked onchange="moveSlider(currentIdx)"> Spread
        </label>
        <label class="tog">
            <input type="checkbox" id="tog-occ" checked onchange="moveSlider(currentIdx)"> Detections
        </label>
        <label class="tog">
            <input type="checkbox" id="tog-iso" checked
                onchange="toggleIsolines()"> Isolines
        </label>
    </div>

    <div class="stat-group">
        <div class="stat">Invaded area<span id="st-area">—</span></div>
        <div class="stat">Detections<span id="st-occ">—</span></div>
    </div>
</div>

<script>
    //  Read config from manifest.js 
    var OBS_END   = MANIFEST.obs_end;
    var SIM_END   = MANIFEST.sim_end;
    var SIM_START = MANIFEST.sim_start;
    var ALL_YEARS = MANIFEST.export_years;

    var currentIdx = 0;

    //  Map 
    var map = L.map('map', { zoomControl: true, preferCanvas: true })
               .setView([40, -88], 5);

    var cartoDB = L.tileLayer(
        'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
        { maxZoom: 19, attribution: '&copy; OpenStreetMap &copy; CARTO' }
    );

    var cartoDBDark = L.tileLayer(
        'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
        { maxZoom: 19, attribution: '&copy; OpenStreetMap &copy; CARTO' }
    ).addTo(map);

    var esriTopo = L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}',
        { attribution: 'Tiles &copy; Esri' }
    );

    L.control.layers(
        { 'Dark': cartoDBDark, 'Light': cartoDB, 'Topographic': esriTopo },
        {}, { position: 'topright' }
    ).addTo(map);

    //  Legend 
    var legend = L.control({ position: 'bottomright' });
    legend.onAdd = function() {
        var div = L.DomUtil.create('div', 'map-legend');
        div.innerHTML = [
            '<h4>Suitability</h4>',
            '<div class="legend-grad-wrap">',
            '  <div class="legend-gradient" style="height:80px;"></div>',
            '  <div class="legend-labels" style="height:80px;">',
            '    <div>1.00</div>',
            '    <div>0.50</div>',
            '    <div>0.00</div>',
            '  </div>',
            '</div>',
            '<div class="legend-sep"></div>',
            '<div class="legend-row">',
            '  <div class="legend-swatch" style="background:rgba(244,162,97,0.65);border:1px solid #c47a3a;"></div>',
            '  <span>Observed invasion</span>',
            '</div>',
            '<div class="legend-row">',
            '  <div class="legend-swatch" style="background:rgba(230,57,70,0.65);border:1px solid #c9184a;"></div>',
            '  <span>Projected spread</span>',
            '</div>',
            '<div class="legend-row">',
            '  <div class="legend-dot" style="background:#fde725;border:1px solid #b5a000;"></div>',
            '  <span>EAB detection</span>',
            '</div>',
            '<div class="legend-sep"></div>',
            '<h4>Invasion fronts</h4>',
            '<div class="legend-row"><svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#ffd60a" stroke-width="1.5"/></svg><span>2025 baseline</span></div>',
            '<div class="legend-row"><svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#ff9500" stroke-width="1.5"/></svg><span>2030</span></div>',
            '<div class="legend-row"><svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#ff6b35" stroke-width="1.5"/></svg><span>2035</span></div>',
            '<div class="legend-row"><svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#8b0000" stroke-width="1.5"/></svg><span>2040</span></div>'
        ].join('');
        return div;
    };
    legend.addTo(map);

    //  Layer groups 
    var suitGroup   = L.layerGroup().addTo(map);
    var spreadGroup = L.layerGroup().addTo(map);
    var occGroup    = L.layerGroup().addTo(map);

    // Suitability colour ramp — viridis
    // dark purple (low) → blue → green → yellow (high)
    function suitColor(s) {
        var stops = [
            [0.00, [ 68,   1,  84]],   // #440154 dark purple
            [0.25, [ 59,  82, 139]],   // #3b528b blue
            [0.50, [ 33, 145, 140]],   // #21918c teal-green
            [0.75, [ 94, 201,  98]],   // #5ec962 green
            [1.00, [253, 231,  37]]    // #fde725 yellow
        ];
        for (var i = 0; i < stops.length - 1; i++) {
            var t0 = stops[i][0],   c0 = stops[i][1];
            var t1 = stops[i+1][0], c1 = stops[i+1][1];
            if (s <= t1) {
                var t = (s - t0) / (t1 - t0);
                var r = Math.round(c0[0] + t * (c1[0] - c0[0]));
                var g = Math.round(c0[1] + t * (c1[1] - c0[1]));
                var b = Math.round(c0[2] + t * (c1[2] - c0[2]));
                return 'rgb(' + r + ',' + g + ',' + b + ')';
            }
        }
        return 'rgb(253,231,37)';
    }

    //  Temporal isolines — appear as slider reaches each year
    var isolineGroup = L.layerGroup().addTo(map);
    var isolinesByYear = {};

    var isoColors = {
        2025: '#ffffff', 2030: '#ffffff', 2035: '#ffffff', 2040: '#ffffff'
    };

    if (typeof ISOLINES !== 'undefined') {
        var isoFeaturesByYear = {};
        ISOLINES.features.forEach(function(f) {
            var yr = f.properties.year;
            if (!isoFeaturesByYear[yr]) isoFeaturesByYear[yr] = [];
            isoFeaturesByYear[yr].push(f);
        });
        Object.keys(isoFeaturesByYear).forEach(function(yr) {
            yr = parseInt(yr);
            var fc = { type: 'FeatureCollection', features: isoFeaturesByYear[yr] };
            isolinesByYear[yr] = L.geoJSON(fc, {
                style: {
                    color:     isoColors[yr] || '#ffffff',
                    weight:    yr === 2025 ? 2.5 : 1.5,
                    opacity:   0.85,
                    dashArray: null
                }
            });
            isolinesByYear[yr].bindPopup(
                (yr <= OBS_END ? '<b>Observed front</b>' : '<b>Projected front</b>') +
                '<br>' + yr
            );
        });
    }

    //  Load suitability from SUIT variable (suitability.js) 
    L.geoJSON(SUIT, {
        style: function(f) {
            var s = f.properties.suit;
            return {
                fillColor:   suitColor(s),
                fillOpacity: 0.12 + s * 0.62,
                color:       'none',
                weight:      0
            };
        },
        onEachFeature: function(f, layer) {
            layer.bindPopup(
                '<b>' + (f.properties.suit * 100).toFixed(0) + '% suitability</b><br>' +
                'Habitat suitability index'
            );
        }
    }).addTo(suitGroup);

    function toggleSuit() {
        if (document.getElementById('tog-suit').checked) map.addLayer(suitGroup);
        else map.removeLayer(suitGroup);
    }

    //  Load detections from DETECTIONS variable (detections.js) 
    var allDetections = DETECTIONS.features;

    //  Main update function 
    function moveSlider(idx) {
        idx = parseInt(idx);
        currentIdx = idx;
        document.getElementById('year-slider').value = idx;

        var year  = ALL_YEARS[idx];
        var isObs = year <= OBS_END;

        document.getElementById('year-display').textContent = year;

        var badge = document.getElementById('status-badge');
        badge.textContent = isObs ? 'Observed' : 'Projected';
        badge.className   = isObs ? 'badge-observed' : 'badge-projected';
        document.getElementById('year-slider').className = isObs ? '' : 'projected';

        var showSpread = document.getElementById('tog-spread').checked;
        var showOcc    = document.getElementById('tog-occ').checked;

        //  Spread layer — read from SPREAD_YYYY variable 
        spreadGroup.clearLayers();
        var nCells = 0;
        if (showSpread) {
            var varName = 'SPREAD_' + year;
            var fc = window[varName];   // access the global variable by name
            if (fc) {
                nCells = fc.features.length;
                L.geoJSON(fc, {
                    style: {
                        fillColor:   isObs ? '#f4a261' : '#e63946',
                        fillOpacity: isObs ? 0.65 : 0.60,
                        color:       isObs ? '#c47a3a' : '#c9184a',
                        weight:      0.4
                    },
                    onEachFeature: function(f, layer) {
                        layer.bindPopup(
                            isObs
                              ? '<b>Confirmed invaded</b><br>Observed &le; ' + year
                              : '<b>Projected invaded</b><br>Simulated year: ' + year
                        );
                    }
                }).addTo(spreadGroup);
            }
        }
        document.getElementById('st-area').textContent =
            nCells > 0 ? '~' + Math.round(nCells * 196).toLocaleString() + ' km²' : '—';

        //  Detections — filter cumulative up to current year 
        occGroup.clearLayers();
        var nOcc   = 0;
        var cutoff = Math.min(year, OBS_END);
        if (showOcc) {
            for (var j = 0; j < allDetections.length; j++) {
                var d = allDetections[j];
                if (d.properties.year > cutoff) continue;
                nOcc++;
                var coords = d.geometry.coordinates;
                L.circleMarker([coords[1], coords[0]], {
                    radius: 3, fillColor: '#fde725', color: '#b5a000',
                    weight: 0.5, fillOpacity: 0.85
                })
                .bindPopup('Detection &mdash; ' + d.properties.year)
                .addTo(occGroup);
            }
        }
        document.getElementById('st-occ').textContent = nOcc.toLocaleString();

        //  Isolines — show fronts for years <= current year
        if (document.getElementById('tog-iso').checked) {
            isolineGroup.clearLayers();
            [2025, 2030, 2035, 2040].forEach(function(isoYr) {
                if (isoYr <= year && isolinesByYear[isoYr]) {
                    isolinesByYear[isoYr].addTo(isolineGroup);
                }
            });
        }
    }

    //  Playback
    var isPlaying = false;
    var playTimer = null;

    function togglePlay() {
        if (isPlaying) {
            clearInterval(playTimer);
            isPlaying = false;
            document.getElementById('play-btn').innerHTML = '&#9654; Play';
        } else {
            isPlaying = true;
            document.getElementById('play-btn').innerHTML = '&#9646;&#9646; Pause';
            if (currentIdx >= ALL_YEARS.length - 1) moveSlider(0);
            playTimer = setInterval(function() {
                if (currentIdx >= ALL_YEARS.length - 1) {
                    clearInterval(playTimer);
                    isPlaying = false;
                    document.getElementById('play-btn').innerHTML = '&#9654; Play';
                    return;
                }
                moveSlider(currentIdx + 1);
            }, 900);
        }
    }

    function toggleIsolines() {
        if (document.getElementById('tog-iso').checked) {
            map.addLayer(isolineGroup);
            moveSlider(currentIdx);
        } else {
            isolineGroup.clearLayers();
            map.removeLayer(isolineGroup);
        }
    }

    //  Keyboard shortcuts 
    document.addEventListener('keydown', function(e) {
        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
        if (e.code === 'ArrowRight') moveSlider(Math.min(currentIdx + 1, ALL_YEARS.length - 1));
        if (e.code === 'ArrowLeft')  moveSlider(Math.max(currentIdx - 1, 0));
    });

    //  Init 
    document.getElementById('year-slider').max = ALL_YEARS.length - 1;

    window.onload = function() {
        var startIdx = ALL_YEARS.indexOf(2003);
        moveSlider(startIdx >= 0 ? startIdx : 0);
    };
</script>
</body>
</html>
